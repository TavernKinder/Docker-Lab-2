<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="/socket.io/socket.io.js"></script>
    <title id="title">Socket IO App</title>
  </head>
  <body>
    <div id="beforeChatUsername">
      <p id="ErrorMessage"></p>
      Please enter your username:
      <input type="text" id="usernameInput" placeholder="Username" />
      <button id="setUsernameButton">Set Username</button>
    </div>
    <div id="chatContainer" style="display: none">
      <h1>Socket IO Chat</h1>
      <div id="messages"></div>
      <input type="text" id="messageInput" placeholder="Type a message..." />
      <button id="sendMessageButton">Send</button>
    </div>
    <script>
      const setUsernameButton = document.getElementById("setUsernameButton");
      const usernameInput = document.getElementById("usernameInput");
      setUsernameButton.addEventListener("click", () => {
        const username = usernameInput.value.trim();
        if (username) {
          socket.emit("tryToVerifyUser", username);
        }
      });

      const socket = io();
      socket.on("verifyUser", (success) => {
        if (success) {
          document.getElementById("beforeChatUsername").style.display = "none";
          document.getElementById("chatContainer").style.display = "block";
          document.getElementById("title").textContent =
            `Socket IO App - ${usernameInput.value}`;
        } else {
          const errorMessage = document.getElementById("ErrorMessage");
          errorMessage.textContent =
            "Username already taken. Please choose another.";
        }
      });
      const sendButton = document.getElementById("sendMessageButton");
      const messageInput = document.getElementById("messageInput");

      function addMessageToChat(username, messageContent) {
        const messageElement = document.createElement("p");
        messageElement.textContent = `${username}: ${messageContent}`;
        const chatDiv = document.getElementById("messages");
        chatDiv.appendChild(messageElement);
      }

      sendButton.addEventListener("click", () => {
        const message = messageInput.value;
        if (message) {
          socket.emit("clientMessage", message);
          messageInput.value = "";
          addMessageToChat("You", message);
        }
      });

      socket.on("connect", () => {
        console.log("Connected to server");
      });

      socket.on("message", (data) => {
        if (typeof data === "object" && data.username && data.message) {
          addMessageToChat(data.username, data.message);
        } else if (typeof data === "string") {
          addMessageToChat("Server", data);
        }
      });
    </script>
  </body>
</html>
